<h1 class="typewriter">Reaction-Diffusion</h1>
<a href=index_ricerca.html>ricerca 	</a>
	<script>
		
		// Smooth scrolling for index links
		document.querySelectorAll('.indice-laterale a').forEach(link => {
			link.addEventListener('click', function(e) {
				e.preventDefault();
				const targetId = this.getAttribute('href');
				const targetElement = document.querySelector(targetId);
				
				if (targetElement) {
					targetElement.scrollIntoView({
						behavior: 'smooth',
						block: 'start'
					});
				}
			});
		});
	</script>
